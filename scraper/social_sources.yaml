# Mamboleo — High-value Kenyan social handles registry
#
# These are accounts with proven breaking-news velocity for security,
# politics, accidents and weather events. Consumed by scrapers/social.py.
#
# Strategy by platform:
#   • twitter / x  → tweepy.get_users_tweets via existing TWITTER_BEARER_TOKEN.
#                    Free Basic tier = 100 reads/month → keep limits low and
#                    target only the highest-velocity handles. Set
#                    `enabled: false` on the rest until tier upgrade.
#   • facebook     → uses RSSHub bridge (env RSSHUB_HOST). If not configured,
#                    the entry is silently skipped.
#                    Pattern: {RSSHUB_HOST}/facebook/page/{id_or_handle}
#   • youtube      → standard YouTube channel RSS:
#                    https://www.youtube.com/feeds/videos.xml?channel_id=…
#
# Fields:
#   id              — short machine identifier (logs + DB)
#   name            — display label
#   platform        — twitter | facebook | youtube
#   handle          — username (no @) for twitter; numeric/handle for facebook;
#                     channel_id for youtube
#   tier            — 1 mainstream | 2 journalists | 3 influencers
#   bias_baseline   — -100 (left) .. +100 (right)
#   max_per_run     — cap per scraper pass (keeps API quota predictable)
#   cadence         — fast | slow
#   enabled         — toggle without deleting

# ─────────────────────────────────────────────────────────────────────────────
# TIER 1 — Mainstream Kenyan media
# ─────────────────────────────────────────────────────────────────────────────

- id: x_citizentvkenya
  name: Citizen TV Kenya (X)
  platform: twitter
  handle: citizentvkenya
  tier: 1
  bias_baseline: -5
  max_per_run: 2
  cadence: slow
  enabled: true

