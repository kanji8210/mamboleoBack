# Mamboleo Media Monitor — source registry
#
# Each entry is consumed by scrapers/generic.py to produce a GenericScraper
# instance at runtime. To add a new outlet, copy an existing entry and adjust.
#
# Fields:
#   id              — short machine identifier (used in logs + DB)
#   name            — human-readable label
#   source_domain   — used as the article "source" string sent to WP
#   tier            — 1 Official | 2 Mainstream | 3 Digital | 4 Regional | 5 International
#   bias_baseline   — editorial lean, -100 (left) .. +100 (right), 0 neutral
#   rss             — list of RSS feed URLs (empty = HTML-only)
#   scrape_pages    — list of HTML index pages to crawl as fallback
#   link_selectors  — CSS selectors that match article <a> on index pages
#   link_pattern    — URL substring fallback when selectors miss
#   content_selectors — CSS selectors that wrap the article body on detail pages
#   cadence         — "fast" (every 15min) | "slow" (hourly)
#   enabled         — toggle without deleting the entry
#
# NOTE: We already have dedicated scrapers for Nation, Standard, Tuko,
# GoogleNews, International, Advisories, Twitter — those remain and are
# NOT duplicated here. This file is the config-driven long tail.

# ─────────────────────────────────────────────────────────────────────────────
# TIER 1 — Official security & government
# ─────────────────────────────────────────────────────────────────────────────

- id: kdf
  name: Kenya Defence Forces
  source_domain: mod.go.ke
  tier: 1
  bias_baseline: 0
  rss: []
  scrape_pages:
    - https://www.mod.go.ke/all-news/
  link_pattern: "/all-news/"
  cadence: fast
  enabled: true

- id: nps
  name: National Police Service
  source_domain: kenyapolice.go.ke
  tier: 1
  bias_baseline: 0
  rss: []
  scrape_pages:
    - https://www.kenyapolice.go.ke/news
    - https://www.kenyapolice.go.ke/2015-09-21-20-53-44/news.html
  link_pattern: "/news"
  timeout: 45          # gov host is slow, can stall past default 25s
  cadence: slow        # too slow for 15-min cadence; hourly is plenty
  enabled: true

- id: interior_ministry
  name: Ministry of Interior
  source_domain: interior.go.ke
  tier: 1
  bias_baseline: 0
  rss: []
  scrape_pages:
    - https://interior.go.ke/newsroom/
  link_pattern: "/newsroom/"
  verify_ssl: false    # hosts a self-signed cert chain (as of 2026)
  timeout: 45
  cadence: slow
  enabled: true

- id: state_house
  name: State House Kenya
  source_domain: statehouse.go.ke
  tier: 1
  bias_baseline: 20
  rss: []
  scrape_pages:
    - https://www.president.go.ke/category/news/
  link_pattern: "/category/news/"
  cadence: slow
  enabled: true

- id: kenya_red_cross
  name: Kenya Red Cross
  source_domain: redcross.or.ke
  tier: 1
  bias_baseline: 0
  rss: []
  scrape_pages:
    - https://www.redcross.or.ke/news-and-publications/news/
  link_pattern: "/news/"
  cadence: slow
  enabled: false       # upstream returns 404 — URL to be updated when site refresh lands

